syntax = "proto3";

// ThrottleKit service door — the supported, language-neutral way to reach the core from any language.
//
// A client (e.g. throttlekit-py's ServiceBackend) sends a request naming a *policy* configured in the
// service; the service runs `createEnforcer()` — the same Node core, the same Lua-in-Redis — and returns
// a Decision. The client never touches the raw Lua wire (see WIRE-PROTOCOL.md); this proto is the only
// contract it depends on, which is exactly why the service door can ship while the raw wire stays
// unfrozen (bet #78).
//
// EVOLUTION (this proto is the "comfortable freeze"): proto3 is additive-evolvable. Add new fields with
// NEW tag numbers; never renumber, never change a field's type, never reuse a retired tag (use
// `reserved`). New RPCs and new message fields are backward-compatible by construction. The decision
// fields below mirror the five frozen `Decision` fields of the core 1.0 API; new optional decision
// attributes (e.g. a binding axis) arrive as new tags, never by reshaping existing ones.
package throttlekit.v1;

// The result of one admission check — the five frozen fields of the core `Decision`, on the wire.
// Field numbers are pinned; integers are int64 (epoch-ms and counts comfortably exceed int32).
message Decision {
  // Whether the request is permitted.
  bool allowed = 1;
  // Effective ceiling: burst capacity (GCRA / token bucket) or window quota.
  int64 limit = 2;
  // Whole units remaining before the next rejection. Never negative.
  int64 remaining = 3;
  // Epoch-ms at which the limiter is fully replenished.
  int64 reset_at = 4;
  // Milliseconds to wait before retrying. 0 when `allowed`.
  int64 retry_after_ms = 5;

  // Tags 6+ reserved for additive optional attributes (e.g. binding_axis, policy_denied) so they can
  // arrive as a minor without reshaping the five above.
  reserved 6 to 15;
}

// Consume `cost` units against a named policy/limiter for `key`.
message CheckRequest {
  // The name of a policy/limiter configured in the service (e.g. from `.throttlekit.yaml`).
  string policy = 1;
  // The identity being limited (the API key, user id, IP, …). The service applies its own key prefix.
  string key = 2;
  // Units to consume. 0 (the proto3 default) is interpreted as 1.
  int64 cost = 3;
}

message CheckResponse {
  Decision decision = 1;
}

// Consume `cost` units against `policy` for many independent keys, evaluated at a single consistent
// instant. Decisions are returned in input order — `decisions[i]` corresponds to `keys[i]`.
message CheckManyRequest {
  string policy = 1;
  repeated string keys = 2;
  int64 cost = 3;
}

message CheckManyResponse {
  repeated Decision decisions = 1;
}

// Non-consuming introspection: the current Decision for `key` WITHOUT spending — `remaining` is what is
// left now, `reset_at` when it refills. The basis of good client retry/UX.
message PeekRequest {
  string policy = 1;
  string key = 2;
}

message PeekResponse {
  Decision decision = 1;
}

// Non-consuming capacity forecast: how many `cost`-sized requests are spendable now, when capacity next
// returns, and when it is fully replenished. Mirrors the core `Forecast`.
message ForecastRequest {
  string policy = 1;
  string key = 2;
  // Request size to forecast against. 0 is interpreted as 1.
  int64 cost = 3;
}

message Forecast {
  // Whole units of the given cost admissible right now before the next denial.
  int64 spendable_now = 1;
  // Epoch-ms when capacity next increases by at least one unit.
  int64 next_replenish_at = 2;
  // Epoch-ms when the limiter is fully replenished to its ceiling from the current state.
  int64 full_at = 3;
}

message ForecastResponse {
  Forecast forecast = 1;
}

// Debit `tokens` of post-hoc cost against a windowed token-budget policy for `key` — the LLM-gateway
// problem, where a request's cost is known only after it streams. A debit is admitted iff budget remains
// before it; the crossing debit is counted in full, then the window's later debits are refused. The
// returned Decision's `remaining` is the tokens left in the window. (Additive: tags ride alongside the
// existing RPCs; pre-existing clients are unaffected.)
message DebitRequest {
  string policy = 1;
  string key = 2;
  // Tokens to debit. 0 (the proto3 default) is interpreted as 1.
  int64 tokens = 3;
}

message DebitResponse {
  Decision decision = 1;
}

// ── Stateful admission lifecycle (concurrency + unified rate×concurrency). Additive: new RPCs + new
// messages, all unary like the existing door. Unlike Check (single-shot rate/cost), Admit may HOLD an
// in-flight concurrency slot that MUST be returned via Release — or the server reclaims it once the
// lease expires. The client↔server lease deliberately mirrors the core's node↔coordinator
// TTL+heartbeat+reclaim-on-crash contract, one layer out (see PHASE7-LIFECYCLE-RPCS.md §5). ──

// Admit one unit of work against a concurrency-only or unified (rate×concurrency) policy.
message AdmitRequest {
  string policy = 1;
  string key    = 2;   // passed to the rate/cost axes; the concurrency axis is keyless
  int64  cost   = 3;   // rate/cost units; 0 ⇒ 1
  int64  hold   = 4;   // 3-axis concurrency term for the joint-LP policy (default 0; experimental)
  int64  value  = 5;   // joint-LP bid value (default 0 ⇒ 1; experimental)
}

message AdmitResponse {
  Decision decision         = 1;   // combined decision across the policy's configured axes
  string   lease_id         = 2;   // opaque, server-minted; "" ⇒ no slot held (nothing to Release)
  int64    lease_expires_at = 3;   // epoch-ms; the server reclaims (Release dropped:true) if not renewed by then
  string   binding_axis     = 4;   // "rate"|"concurrency"|"cost"|"" — on the WRAPPER, matching core 1.0 (D1)
  bool     policy_denied    = 5;   // joint-LP bid-price denial (every per-axis budget had slack)
}

// Return a held slot. dropped:true signals overload (timeout/error) so the adaptive limit contracts.
message ReleaseRequest  { string lease_id = 1; bool dropped = 2; }
message ReleaseResponse {}                       // empty; Release is idempotent

// Renew ALL of a client's open leases in one beat (mirrors the core's one-node-beat-covers-all-permits).
message HeartbeatRequest  { repeated string lease_ids = 1; }
message HeartbeatResponse {
  repeated string live_ids      = 1;   // still held; deadline extended
  repeated string reclaimed_ids = 2;   // already reclaimed (client too slow) — treat as dropped
  int64           next_deadline = 3;   // epoch-ms by which the next beat must arrive
}

// The admission service. Transport concerns are deliberately out of band:
//   - AUTH: mTLS or a shared secret in call metadata (table-stakes so nothing can poison the budget).
//   - FAIL-OPEN / FAIL-CLOSED applies when the SERVICE itself is unreachable (a transport error) — that
//     is the client's policy, not a field here; a returned Decision is always authoritative.
//   - A server-side store outage is surfaced per the service's configured fail mode inside the returned
//     Decision (fail-open ⇒ allowed), matching the library's `fail: open|closed` semantics.
service RateLimiter {
  // Consume cost units; the returned Decision is authoritative.
  rpc Check(CheckRequest) returns (CheckResponse);
  // Batch of independent keys at one consistent instant.
  rpc CheckMany(CheckManyRequest) returns (CheckManyResponse);
  // Non-consuming peek.
  rpc Peek(PeekRequest) returns (PeekResponse);
  // Non-consuming forecast.
  rpc Forecast(ForecastRequest) returns (ForecastResponse);
  // Debit post-hoc token cost against a windowed token-budget policy (the cost axis).
  rpc Debit(DebitRequest) returns (DebitResponse);

  // Stateful admission lifecycle for concurrency / unified policies. A granted admission that holds a
  // slot returns a non-empty lease_id that MUST be returned via Release (the server reclaims it on
  // lease expiry if a client crashes). Heartbeat renews all of a client's open leases.
  rpc Admit(AdmitRequest)         returns (AdmitResponse);
  rpc Release(ReleaseRequest)     returns (ReleaseResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
}

// ── Monitor — a read-only observability door (ADDITIVE: a SECOND service on the same gRPC port; it never
// touches the RateLimiter messages above and is strictly non-mutating). It projects the in-process
// telemetry snapshot the `--tui` dashboard renders, so any language can read operational state remotely.
//
// AUTH POSTURE: the snapshot carries traffic keys (the limited identities = PII), so the server serves
// Monitor loopback-only by default; exposing it beyond loopback requires a monitor secret presented in
// call metadata (`x-monitor-secret`, or `authorization: Bearer <secret>`). The decision RPCs above are
// unaffected. Pair the secret with TLS for confidentiality on an exposed port. ──

message GetSnapshotRequest {}

// Snapshot envelope metadata (mirrors the dashboard's `meta`).
message MonitorMeta {
  int64  generated_at = 1; // epoch-ms the snapshot was produced
  int64  window_ms    = 2; // analytics window width the counters aggregate over
  string mode         = 3; // "process" (single instance) | "fleet" (reserved)
  string lens_version = 4; // the hub/dashboard version
  string node_id      = 5; // stable node id (e.g. host:port), or "" if unset
}

// A key with an occurrence count (one heavy-hitter row).
message KeyCount {
  string key   = 1;
  int64  count = 2;
}

// Recent admit-path latency summary for a policy (ms; p50/p99 nearest-rank). Absent (n=0) until traffic.
message LatencySummary {
  double avg_ms = 1;
  double p50_ms = 2;
  double p99_ms = 3;
  double max_ms = 4;
  int64  n      = 5;
}

// One tracked policy's at-a-glance counters — the STABLE projection; the full per-axis analytics ride in
// Snapshot.raw_json so the frozen wire is never coupled to the evolving internal analytics shape.
message PolicySummary {
  string         name          = 1;
  string         kind          = 2; // "limiter" | "admitter"
  string         strategy      = 3; // e.g. "gcra"; "" for an admitter
  int64          allowed       = 4; // admitted this window
  int64          denied        = 5; // rejected this window
  int64          limit         = 6; // most-recent observed ceiling; 0 if unknown
  LatencySummary latency       = 7;
  repeated KeyCount top_denied    = 8;
  repeated KeyCount top_requested = 9;
}

// One concurrency guard's health (distributed extras present only for a distributed guard).
message GuardSummary {
  string name     = 1;
  int64  limit    = 2;
  int64  inflight = 3;
  double share    = 4; // distributed: this node's share of the global ceiling; 0 if n/a
  int64  l_global = 5; // distributed: aggregated global ceiling; 0 if n/a
  int64  nodes    = 6; // distributed: live node count; 0 if n/a
  bool   fenced   = 7; // distributed: node self-fenced (partitioned)
}

// One denial — the "why, with numbers". Used by the snapshot's recent feed (and the Watch stream).
message DenialEvent {
  int64  at             = 1; // epoch-ms
  string policy         = 2;
  string key            = 3; // the limited identity (PII — hence the Monitor's auth posture)
  string axis           = 4; // binding lane "rate"|"concurrency"|"cost" (admitters), else ""
  int64  limit          = 5;
  int64  remaining      = 6;
  int64  retry_after_ms = 7;
}

// The operational snapshot. The typed fields are the stable contract; `raw_json` carries the FULL
// dashboard snapshot (cost rooms, per-axis analytics, replay, custom stats, fence feed) as JSON — for
// depth + forward-compatibility, keeping the frozen wire decoupled from the internal snapshot shape.
message Snapshot {
  MonitorMeta            meta           = 1;
  repeated PolicySummary policies       = 2;
  repeated GuardSummary  guards         = 3;
  repeated DenialEvent   recent_denials = 4;
  string                 raw_json       = 5; // full LensSnapshot as JSON (see throttlekit-server docs)
}

message GetSnapshotResponse {
  Snapshot snapshot = 1;
}

// Open a live denial feed (the hub emits one per rejected decision). Server-side rate-capped AND
// backpressured: a slow reader simply DROPS events — the feed never grows server memory and never blocks
// the control path. It is best-effort observability, not a durable log (use decision capture for that).
message WatchRequest {
  string policy = 1; // "" = every policy; else only this policy's denials
}

// One streamed denial. (A message per event; `Watch` returns a stream of these.)
message WatchResponse {
  DenialEvent denial = 1;
}

// Read-only observability. Strictly non-mutating; never returns or affects a rate-limit decision.
service Monitor {
  // A point-in-time operational snapshot (stateless, cacheable, individually load-balanced).
  rpc GetSnapshot(GetSnapshotRequest) returns (GetSnapshotResponse);
  // A live server-streamed denial feed (best-effort: rate-capped + backpressured; slow readers drop events).
  rpc Watch(WatchRequest) returns (stream WatchResponse);
}

// ── Fleet — the Tier-2 client-held lease door (ADDITIVE: a THIRD service on the same gRPC port; it never
// touches the RateLimiter / Monitor messages above). For a high-throughput client, a per-request
// Check/Debit round trip is the bottleneck; `Reserve` hands the client a CHUNK of a policy's global
// per-window budget to spend locally, round-tripping only to refresh. The SERVER stays the one oracle — it
// computes the grant SIZE via the policy's coordinator; the client may only subtract from the granted
// balance and synthesize an allow (the `LeaseSpender` contract, pinned by the golden lease vectors). The
// grant is window-coupled: valid only until `expiry_ms`, and the client discards the remainder at that
// boundary, so the per-window global total stays bounded independent of how many clients lease.
//
// AUTH POSTURE (mirrors Monitor): handing out budget is a poisoning vector, so the door is loopback-only by
// default; exposing it beyond loopback requires a fleet secret in call metadata (`x-fleet-secret`, or
// `authorization: Bearer <secret>`). Pair the secret with TLS on an exposed port. ──

// Which axis of a policy's budget a lease draws from. AXIS_UNSPECIFIED (the proto3 zero) is treated as RATE.
enum Axis {
  AXIS_UNSPECIFIED = 0;
  AXIS_RATE = 1; // a windowed rate / quota budget (the v1 leasable axis)
  AXIS_CONCURRENCY = 2; // in-flight slots — NOT leasable in v1 (Reserve returns UNIMPLEMENTED)
  AXIS_TOKEN_BUDGET = 3; // a windowed token budget (leased identically to RATE — windowed credits)
}

// Who is leasing — identity + telemetry. `domain` selects WHICH budget within the policy (the lease key);
// the rest is attribution the server MAY use for sizing / observability (advisory in v1).
message Caller {
  string domain = 1; // the budget key to lease (e.g. a tenant id); "" ⇒ the policy's whole budget
  string client_id = 2; // a stable id for the leasing client (telemetry)
  string region = 3; // the client's region (telemetry / future region-aware sizing)
  int64 priority = 4; // relative priority hint (reserved; ignored in v1)
}

// Lease up to `wants` units of `policy`'s global per-window budget. `has`/`used` report the client's
// current local balance + spend (advisory — the coordinator enforces the global bound regardless).
message ReserveRequest {
  string policy = 1; // a policy configured for fleet leasing (a `federated:` policy)
  Caller caller = 2;
  int64 wants = 3; // units requested; 0 ⇒ 1
  int64 has = 4; // the client's current local credits (advisory)
  int64 used = 5; // units the client has spent since its last refresh (advisory)
  Axis axis = 6;
}

// A granted lease: spend `capacity` units locally until `expiry_ms`, then re-lease. A `capacity` of 0 is a
// refusal (the global budget is spent) — the client treats it as a denial, retrying after `retry_after_ms`.
message Lease {
  int64 capacity = 1; // GRANTED units (>= 0; may be < wants — a partial grant; 0 = refused)
  int64 expiry_ms = 2; // epoch-ms window boundary; the client discards leftover credits at this instant
  int64 refresh_interval_ms = 3; // hint: re-lease around here (the time remaining to expiry_ms)
  int64 safe_capacity = 4; // capacity safe to spend under client clock uncertainty (v1: = capacity)
  int64 retry_after_ms = 5; // when capacity == 0: ms until the budget refreshes; else 0
  int64 limit = 6; // the policy's global per-window ceiling (for the client's synthesized Decision)
}

message ReserveResponse {
  Lease lease = 1;
  // `owner_redirect` (a sharded-owner hint) implies a topology that does not exist — the tag + name are
  // reserved so a future additive shard map can never collide with a client shipped today.
  reserved 2 to 15;
  reserved "owner_redirect";
}

// The Tier-2 client-held lease door. One unary RPC in v1 — a streaming refresh (`ReserveStream`) is
// intentionally deferred: the client polls `refresh_interval_ms`; streaming can be added additively later.
service Fleet {
  // Lease a chunk of a policy's global per-window budget for local spend. The returned Lease's `capacity`
  // is the GRANTED amount (the one-oracle line: the server sizes the grant; the client only spends it).
  rpc Reserve(ReserveRequest) returns (ReserveResponse);
}
