syntax = "proto3";

// ThrottleKit service door — the supported, language-neutral way to reach the core from any language.
//
// A client (e.g. throttlekit-py's ServiceBackend) sends a request naming a *policy* configured in the
// service; the service runs `createEnforcer()` — the same Node core, the same Lua-in-Redis — and returns
// a Decision. The client never touches the raw Lua wire (see WIRE-PROTOCOL.md); this proto is the only
// contract it depends on, which is exactly why the service door can ship while the raw wire stays
// unfrozen (bet #78).
//
// EVOLUTION (this proto is the "comfortable freeze"): proto3 is additive-evolvable. Add new fields with
// NEW tag numbers; never renumber, never change a field's type, never reuse a retired tag (use
// `reserved`). New RPCs and new message fields are backward-compatible by construction. The decision
// fields below mirror the five frozen `Decision` fields of the core 1.0 API; new optional decision
// attributes (e.g. a binding axis) arrive as new tags, never by reshaping existing ones.
package throttlekit.v1;

// The result of one admission check — the five frozen fields of the core `Decision`, on the wire.
// Field numbers are pinned; integers are int64 (epoch-ms and counts comfortably exceed int32).
message Decision {
  // Whether the request is permitted.
  bool allowed = 1;
  // Effective ceiling: burst capacity (GCRA / token bucket) or window quota.
  int64 limit = 2;
  // Whole units remaining before the next rejection. Never negative.
  int64 remaining = 3;
  // Epoch-ms at which the limiter is fully replenished.
  int64 reset_at = 4;
  // Milliseconds to wait before retrying. 0 when `allowed`.
  int64 retry_after_ms = 5;

  // Tags 6+ reserved for additive optional attributes (e.g. binding_axis, policy_denied) so they can
  // arrive as a minor without reshaping the five above.
  reserved 6 to 15;
}

// Consume `cost` units against a named policy/limiter for `key`.
message CheckRequest {
  // The name of a policy/limiter configured in the service (e.g. from `.throttlekit.yaml`).
  string policy = 1;
  // The identity being limited (the API key, user id, IP, …). The service applies its own key prefix.
  string key = 2;
  // Units to consume. 0 (the proto3 default) is interpreted as 1.
  int64 cost = 3;
}

message CheckResponse {
  Decision decision = 1;
}

// Consume `cost` units against `policy` for many independent keys, evaluated at a single consistent
// instant. Decisions are returned in input order — `decisions[i]` corresponds to `keys[i]`.
message CheckManyRequest {
  string policy = 1;
  repeated string keys = 2;
  int64 cost = 3;
}

message CheckManyResponse {
  repeated Decision decisions = 1;
}

// Non-consuming introspection: the current Decision for `key` WITHOUT spending — `remaining` is what is
// left now, `reset_at` when it refills. The basis of good client retry/UX.
message PeekRequest {
  string policy = 1;
  string key = 2;
}

message PeekResponse {
  Decision decision = 1;
}

// Non-consuming capacity forecast: how many `cost`-sized requests are spendable now, when capacity next
// returns, and when it is fully replenished. Mirrors the core `Forecast`.
message ForecastRequest {
  string policy = 1;
  string key = 2;
  // Request size to forecast against. 0 is interpreted as 1.
  int64 cost = 3;
}

message Forecast {
  // Whole units of the given cost admissible right now before the next denial.
  int64 spendable_now = 1;
  // Epoch-ms when capacity next increases by at least one unit.
  int64 next_replenish_at = 2;
  // Epoch-ms when the limiter is fully replenished to its ceiling from the current state.
  int64 full_at = 3;
}

message ForecastResponse {
  Forecast forecast = 1;
}

// Debit `tokens` of post-hoc cost against a windowed token-budget policy for `key` — the LLM-gateway
// problem, where a request's cost is known only after it streams. A debit is admitted iff budget remains
// before it; the crossing debit is counted in full, then the window's later debits are refused. The
// returned Decision's `remaining` is the tokens left in the window. (Additive: tags ride alongside the
// existing RPCs; pre-existing clients are unaffected.)
message DebitRequest {
  string policy = 1;
  string key = 2;
  // Tokens to debit. 0 (the proto3 default) is interpreted as 1.
  int64 tokens = 3;
}

message DebitResponse {
  Decision decision = 1;
}

// ── Stateful admission lifecycle (concurrency + unified rate×concurrency). Additive: new RPCs + new
// messages, all unary like the existing door. Unlike Check (single-shot rate/cost), Admit may HOLD an
// in-flight concurrency slot that MUST be returned via Release — or the server reclaims it once the
// lease expires. The client↔server lease deliberately mirrors the core's node↔coordinator
// TTL+heartbeat+reclaim-on-crash contract, one layer out (see PHASE7-LIFECYCLE-RPCS.md §5). ──

// Admit one unit of work against a concurrency-only or unified (rate×concurrency) policy.
message AdmitRequest {
  string policy = 1;
  string key    = 2;   // passed to the rate/cost axes; the concurrency axis is keyless
  int64  cost   = 3;   // rate/cost units; 0 ⇒ 1
  int64  hold   = 4;   // 3-axis concurrency term for the joint-LP policy (default 0; experimental)
  int64  value  = 5;   // joint-LP bid value (default 0 ⇒ 1; experimental)
}

message AdmitResponse {
  Decision decision         = 1;   // combined decision across the policy's configured axes
  string   lease_id         = 2;   // opaque, server-minted; "" ⇒ no slot held (nothing to Release)
  int64    lease_expires_at = 3;   // epoch-ms; the server reclaims (Release dropped:true) if not renewed by then
  string   binding_axis     = 4;   // "rate"|"concurrency"|"cost"|"" — on the WRAPPER, matching core 1.0 (D1)
  bool     policy_denied    = 5;   // joint-LP bid-price denial (every per-axis budget had slack)
}

// Return a held slot. dropped:true signals overload (timeout/error) so the adaptive limit contracts.
message ReleaseRequest  { string lease_id = 1; bool dropped = 2; }
message ReleaseResponse {}                       // empty; Release is idempotent

// Renew ALL of a client's open leases in one beat (mirrors the core's one-node-beat-covers-all-permits).
message HeartbeatRequest  { repeated string lease_ids = 1; }
message HeartbeatResponse {
  repeated string live_ids      = 1;   // still held; deadline extended
  repeated string reclaimed_ids = 2;   // already reclaimed (client too slow) — treat as dropped
  int64           next_deadline = 3;   // epoch-ms by which the next beat must arrive
}

// The admission service. Transport concerns are deliberately out of band:
//   - AUTH: mTLS or a shared secret in call metadata (table-stakes so nothing can poison the budget).
//   - FAIL-OPEN / FAIL-CLOSED applies when the SERVICE itself is unreachable (a transport error) — that
//     is the client's policy, not a field here; a returned Decision is always authoritative.
//   - A server-side store outage is surfaced per the service's configured fail mode inside the returned
//     Decision (fail-open ⇒ allowed), matching the library's `fail: open|closed` semantics.
service RateLimiter {
  // Consume cost units; the returned Decision is authoritative.
  rpc Check(CheckRequest) returns (CheckResponse);
  // Batch of independent keys at one consistent instant.
  rpc CheckMany(CheckManyRequest) returns (CheckManyResponse);
  // Non-consuming peek.
  rpc Peek(PeekRequest) returns (PeekResponse);
  // Non-consuming forecast.
  rpc Forecast(ForecastRequest) returns (ForecastResponse);
  // Debit post-hoc token cost against a windowed token-budget policy (the cost axis).
  rpc Debit(DebitRequest) returns (DebitResponse);

  // Stateful admission lifecycle for concurrency / unified policies. A granted admission that holds a
  // slot returns a non-empty lease_id that MUST be returned via Release (the server reclaims it on
  // lease expiry if a client crashes). Heartbeat renews all of a client's open leases.
  rpc Admit(AdmitRequest)         returns (AdmitResponse);
  rpc Release(ReleaseRequest)     returns (ReleaseResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
}
