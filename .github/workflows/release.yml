name: Release

# Publishes throttlekit-py to PyPI when a `v*` tag is pushed, e.g.
#   git tag v0.1.0 && git push origin v0.1.0
#
# Auth: a PyPI API token stored as the repo secret PYPI_API_TOKEN. Add it once with
#   gh secret set PYPI_API_TOKEN -R AmeyaBorkar/throttlekit-py
# (paste the token — starting `pypi-` — at the prompt; it lands only in GitHub's encrypted secrets).
# For the FIRST publish of a not-yet-existing project the token must be ACCOUNT-scoped (a
# project-scoped token can't exist until the project does); swap to a project-scoped token afterward.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build dists
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/* # validates metadata + README rendering before any upload
      - name: Assert the wheel ships the gRPC stubs (regression guard)
        # The _generated/ stubs are git-ignored; a build-hook regression would silently produce a
        # stub-less wheel whose ServiceBackend ImportErrors on install. Fail the release loudly instead.
        run: |
          python - <<'PY'
          import glob, zipfile, sys
          whl = glob.glob("dist/*.whl")[0]
          names = zipfile.ZipFile(whl).namelist()
          need = "throttlekit/_generated/throttlekit_pb2_grpc.py"
          if need not in names:
              sys.exit(f"REGRESSION: {need} missing from {whl}\n{names}")
          print(f"OK: {whl} ships the gRPC stubs")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
