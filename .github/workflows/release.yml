name: Release

# Publishes throttlekit-py to PyPI when a `v*` tag is pushed, e.g.
#   git tag v0.1.0 && git push origin v0.1.0
#
# Auth: a PyPI API token stored as the repo secret PYPI_API_TOKEN. Add it once with
#   gh secret set PYPI_API_TOKEN -R AmeyaBorkar/throttlekit-py
# (paste the token — starting `pypi-` — at the prompt; it lands only in GitHub's encrypted secrets).
# For the FIRST publish of a not-yet-existing project the token must be ACCOUNT-scoped (a
# project-scoped token can't exist until the project does); swap to a project-scoped token afterward.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build dists
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/* # validates metadata + README rendering before any upload
      - name: Smoke-test the wheel installs + imports in a clean env (regression guard)
        # Two packaging bugs have silently broken `import ServiceBackend` on a fresh install: missing
        # gRPC stubs (git-ignored, not packaged) and a missing protobuf runtime dep (grpcio doesn't pull
        # it). A file-presence check missed the second. So install the *built wheel* into a throwaway
        # venv with only its declared deps and import the service door for real.
        run: |
          set -euo pipefail
          WHL=$(ls dist/*.whl)
          python -m venv /tmp/smoke
          /tmp/smoke/bin/python -m pip install --quiet "$WHL"
          /tmp/smoke/bin/python -c "from throttlekit import ServiceBackend, RedisBackend; print('clean-install import OK')"
          # The gencode pins a protobuf floor; prove our declared floor actually satisfies it (if a
          # future build bumps the gencode above this pin, this fails loudly → bump the floor).
          /tmp/smoke/bin/python -m pip install --quiet "protobuf==6.31.1"
          /tmp/smoke/bin/python -c "from throttlekit import ServiceBackend; print('floor-protobuf import OK')"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
