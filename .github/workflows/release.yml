name: Release

# Publishes throttlekit-py to PyPI when a `v*` tag is pushed, then cuts the matching GitHub Release
# (notes from the CHANGELOG section for that version) so the tag shows as "Latest" on GitHub. e.g.
#   git tag v0.5.0 && git push origin v0.5.0
#
# Auth: PyPI TRUSTED PUBLISHING (OIDC) — no long-lived token. The publish job mints a short-lived OIDC
# token (`id-token: write`) that PyPI exchanges for an upload token, scoped to this repo + workflow.
#
# ONE-TIME PyPI SETUP (required before the next release, else publish fails `invalid-publisher`):
#   PyPI → the `throttlekit-py` project → Settings → Publishing → "Add a new pending publisher", with:
#     PyPI Project Name : throttlekit-py
#     Owner             : AmeyaBorkar
#     Repository name   : throttlekit-py
#     Workflow filename : release.yml
#     Environment       : (leave blank)
#   (The project already exists, so configure it under the project's own Publishing settings — not the
#   account-level "pending publishers" for a not-yet-created project.)
# Once a trusted-publishing release succeeds, the old `PYPI_API_TOKEN` repo secret is unused and can be
# deleted. See RELEASING.md.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build dists
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/* # validates metadata + README rendering before any upload
      - name: Smoke-test the wheel installs + imports in a clean env (regression guard)
        # Two packaging bugs have silently broken `import ServiceBackend` on a fresh install: missing
        # gRPC stubs (git-ignored, not packaged) and a missing protobuf runtime dep (grpcio doesn't pull
        # it). A file-presence check missed the second. So install the *built wheel* into a throwaway
        # venv with only its declared deps and import the service door for real.
        run: |
          set -euo pipefail
          WHL=$(ls dist/*.whl)
          python -m venv /tmp/smoke
          /tmp/smoke/bin/python -m pip install --quiet "$WHL"
          /tmp/smoke/bin/python -c "from throttlekit import ServiceBackend, RedisBackend; print('clean-install import OK')"
          # The gencode pins a protobuf floor; prove our declared floor actually satisfies it (if a
          # future build bumps the gencode above this pin, this fails loudly → bump the floor).
          /tmp/smoke/bin/python -m pip install --quiet "protobuf==6.31.1"
          /tmp/smoke/bin/python -c "from throttlekit import ServiceBackend; print('floor-protobuf import OK')"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      # Trusted publishing: mint the OIDC token PyPI exchanges for a scoped upload token. No password.
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        # No `password:` → the action uses the OIDC token from `id-token: write` (trusted publishing).
        with:
          # Idempotency: a duplicate-version upload (e.g. a re-pushed/re-run tag) is a no-op success,
          # not a hard "file already exists" failure. PyPI never allows overwriting an existing version.
          skip-existing: true

  github-release:
    name: GitHub Release
    # Cut the GitHub Release only after the version is actually on PyPI, so the notes' `pip install
    # ==<version>` line is true the moment the Release appears. Without this job a pushed tag publishes
    # to PyPI but leaves no Release object, so GitHub keeps badging the previous version "Latest".
    needs: pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write # least privilege: only this job may write the Release (top-level default is read).
    steps:
      - uses: actions/checkout@v5
      - name: Create (or update) the GitHub Release for this tag
        env:
          # gh authenticates from the auto-provisioned, job-scoped GITHUB_TOKEN — no extra secret needed.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          # Pull the CHANGELOG block for this version: every line under the "## [X.Y.Z] …" header up to
          # the next "## [" header. Uses literal prefix matching (index(...)==1), not regex, so the dots
          # and brackets in the version need no escaping (a dynamic regex mis-escapes across awk variants).
          NOTES=$(awk -v hdr="## [$VERSION]" '
            index($0, hdr) == 1               { capture=1; next }
            capture && index($0, "## [") == 1 { exit }
            capture                           { print }
          ' CHANGELOG.md)
          NOTES_FILE="$(mktemp)"
          {
            if printf '%s' "$NOTES" | grep -q '[^[:space:]]'; then
              printf '%s\n\n' "$NOTES"
            else
              # No matching CHANGELOG entry — never ship an empty Release body.
              printf 'Release %s. See [CHANGELOG.md](CHANGELOG.md).\n\n' "$TAG"
            fi
            printf 'Install: `pip install throttlekit-py==%s`\n' "$VERSION"
          } > "$NOTES_FILE"
          # Idempotent: re-running a tag updates the existing Release instead of failing.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists — updating notes + marking latest."
            gh release edit "$TAG" --title "$TAG" --notes-file "$NOTES_FILE" --latest
          else
            echo "Creating Release $TAG (marked latest)."
            gh release create "$TAG" --title "$TAG" --notes-file "$NOTES_FILE" --latest --verify-tag
          fi
